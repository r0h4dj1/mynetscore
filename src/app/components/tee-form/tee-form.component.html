<div [formGroup]="parentForm" class="flex flex-col gap-6">
  <div>
    <label class="block text-xs font-light text-secondary-font mb-2" [attr.for]="fieldId('teeName')">Tee name</label>
    <input
      [id]="fieldId('teeName')"
      formControlName="teeName"
      class="w-full bg-background border border-borders rounded-xl px-4 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
      [appValidationStatus]="submitCount"
      type="text"
      aria-label="Tee name"
    />
  </div>

  <div class="flex gap-3">
    <div class="flex-1 min-w-0">
      <label class="block text-xs font-light text-secondary-font mb-2" [attr.for]="fieldId('rating')"
        >Course rating</label
      >
      <input
        [id]="fieldId('rating')"
        formControlName="rating"
        class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
        [appValidationStatus]="submitCount"
        type="number"
        inputmode="decimal"
        step="0.1"
        aria-label="Course rating"
      />
    </div>

    <div class="flex-1 min-w-0">
      <label class="block text-xs font-light text-secondary-font mb-2" [attr.for]="fieldId('slope')"
        >Slope rating</label
      >
      <input
        [id]="fieldId('slope')"
        formControlName="slope"
        class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
        [appValidationStatus]="submitCount"
        type="number"
        inputmode="numeric"
        aria-label="Slope rating"
      />
    </div>

    <div class="flex-1 min-w-0">
      <label class="block text-xs font-light text-secondary-font mb-2" [attr.for]="fieldId('par')">Par</label>
      <input
        [id]="fieldId('par')"
        formControlName="par"
        class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
        [appValidationStatus]="submitCount"
        type="number"
        inputmode="numeric"
        aria-label="Par"
      />
    </div>
  </div>
</div>
