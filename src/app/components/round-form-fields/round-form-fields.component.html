<div [formGroup]="host.roundForm" class="flex flex-col gap-5">
  <section>
    <div class="flex items-center justify-between mb-2">
      <label class="block text-xs font-light text-secondary-font" for="courseId">Course</label>
      <ng-content select="[courseAction]"></ng-content>
    </div>

    <div class="relative">
      <button
        type="button"
        id="courseId"
        class="w-full appearance-none bg-surface border text-left rounded-xl px-4 py-3 pr-12 text-base focus:outline-none box-border transition-colors active:bg-background"
        [class.text-primary-font]="host.roundForm.controls.courseId.value"
        [class.text-secondary-font]="!host.roundForm.controls.courseId.value"
        [class.border-error]="host.shouldShowError('courseId')"
        [class.border-borders]="!host.shouldShowError('courseId')"
        (click)="host.onCourseSelectorTap()"
      >
        <span class="block w-full truncate">
          {{ host.selectedCourseLabel || 'Select a course...' }}
        </span>
      </button>
      <ng-icon
        name="ionChevronDown"
        class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-lg"
        [color]="'var(--color-alabaster-grey)'"
      ></ng-icon>
    </div>
  </section>

  <section>
    <div class="flex items-center justify-between mb-2">
      <label class="block text-xs font-light text-secondary-font" for="teeId">Tee</label>
      <ng-content select="[teeAction]"></ng-content>
    </div>

    <div class="relative">
      <button
        type="button"
        id="teeId"
        class="w-full appearance-none border text-left rounded-xl px-4 py-3 pr-12 text-base focus:outline-none box-border transition-colors"
        [class.bg-surface]="!host.roundForm.controls.teeId.disabled"
        [class.bg-background]="host.roundForm.controls.teeId.disabled"
        [class.text-primary-font]="host.roundForm.controls.teeId.value"
        [class.text-secondary-font]="!host.roundForm.controls.teeId.value"
        [class.opacity-50]="host.roundForm.controls.teeId.disabled"
        [class.cursor-not-allowed]="host.roundForm.controls.teeId.disabled"
        [class.active:bg-background]="!host.roundForm.controls.teeId.disabled"
        [class.border-error]="host.shouldShowError('teeId')"
        [class.border-borders]="!host.shouldShowError('teeId')"
        [disabled]="host.roundForm.controls.teeId.disabled"
        (click)="host.onTeeSelectorTap()"
      >
        <span class="block w-full truncate">
          @if (host.selectedTeeName) {
            {{ host.selectedTeeName }}
            <span class="ml-1.5 text-secondary-font font-light">{{ host.selectedTeeDetails }}</span>
          } @else {
            Select a tee...
          }
        </span>
      </button>
      <ng-icon
        name="ionChevronDown"
        class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-lg"
        [color]="host.roundForm.controls.teeId.disabled ? 'var(--color-borders)' : 'var(--color-alabaster-grey)'"
      ></ng-icon>
    </div>
  </section>

  <div class="h-px bg-borders"></div>

  <section>
    <label class="block text-xs font-light text-secondary-font mb-2" for="date">Date played</label>
    <button
      type="button"
      id="date"
      class="relative w-full bg-surface border rounded-xl px-4 py-3 pr-12 text-left text-base text-primary-font focus:outline-none box-border"
      [class.border-error]="host.shouldShowError('date')"
      [class.border-borders]="!host.shouldShowError('date')"
      (click)="host.onDateSelectorTap()"
    >
      <span class="block w-full">
        {{ host.formattedDateLabel }}
      </span>
      <ng-icon
        name="ionCalendarClear"
        class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-lg"
        [color]="'var(--color-alabaster-grey)'"
      ></ng-icon>
    </button>
  </section>

  <section>
    <label class="block text-xs font-light text-secondary-font mb-2" for="grossScore">Gross score</label>
    <input
      id="grossScore"
      formControlName="grossScore"
      type="number"
      inputmode="numeric"
      [min]="host.minGrossScore"
      [max]="host.maxGrossScore"
      class="w-full bg-surface border border-borders rounded-xl px-4 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
      [appValidationStatus]="host.submitCount"
    />
  </section>
</div>
