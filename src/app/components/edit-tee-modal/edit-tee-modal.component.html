<div class="flex flex-col bg-surface pb-8">
  <header class="px-4 pt-6 pb-4 border-b border-borders shrink-0">
    <h2 class="text-2xl font-medium m-0 text-primary-font">Edit tee</h2>
  </header>

  <div class="flex-1 px-4 py-6">
    <form [formGroup]="editTeeForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
      <app-tee-form [parentForm]="editTeeForm" [submitCount]="editTeeSubmitCount" idPrefix="edit"></app-tee-form>

      <div class="flex flex-col gap-3 pt-2">
        <button
          type="submit"
          class="w-full h-14 rounded-lg font-medium text-lg bg-primary text-onyx border-none outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
        >
          Save tee
        </button>

        <button
          type="button"
          (click)="onDelete()"
          class="w-full h-14 rounded-lg font-medium text-lg bg-surface text-error-light border border-error-light outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
        >
          Delete tee
        </button>
      </div>
    </form>
  </div>
</div>
