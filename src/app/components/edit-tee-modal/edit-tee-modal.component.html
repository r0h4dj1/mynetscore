<div class="flex flex-col bg-surface pb-8">
  <header class="px-4 pt-6 pb-4 border-b border-borders shrink-0">
    <h2 class="text-2xl font-medium m-0 text-primary-font">Edit tee</h2>
  </header>

  <div class="flex-1 px-4 py-6">
    <form [formGroup]="editTeeForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
      <div>
        <label class="block text-xs font-light text-secondary-font mb-2" for="editTeeName">Tee name</label>
        <input
          id="editTeeName"
          formControlName="teeName"
          class="w-full bg-background border border-borders rounded-xl px-4 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
          type="text"
        />
      </div>

      <div class="flex gap-3">
        <div class="flex-1 min-w-0">
          <label class="block text-xs font-light text-secondary-font mb-2" for="editRating">Course rating</label>
          <input
            id="editRating"
            formControlName="rating"
            class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
            type="number"
            inputmode="decimal"
            step="0.1"
          />
        </div>

        <div class="flex-1 min-w-0">
          <label class="block text-xs font-light text-secondary-font mb-2" for="editSlope">Slope rating</label>
          <input
            id="editSlope"
            formControlName="slope"
            class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
            type="number"
            inputmode="numeric"
          />
        </div>

        <div class="flex-1 min-w-0">
          <label class="block text-xs font-light text-secondary-font mb-2" for="editPar">Par</label>
          <input
            id="editPar"
            formControlName="par"
            class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
            type="number"
            inputmode="numeric"
          />
        </div>
      </div>

      <div class="flex flex-col gap-3 pt-2">
        <button
          type="submit"
          class="w-full h-14 rounded-lg font-medium text-lg bg-primary text-onyx border-none outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
        >
          Save tee
        </button>

        <button
          type="button"
          (click)="onDelete()"
          class="w-full h-14 rounded-lg font-medium text-lg bg-surface text-error-light border border-error-light outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
        >
          Delete tee
        </button>
      </div>
    </form>
  </div>
</div>
