<div class="flex flex-col bg-surface pb-8">
  <header class="px-4 pt-6 pb-4 border-b border-borders shrink-0">
    <h2 class="text-2xl font-medium m-0 text-primary-font">Edit course</h2>
  </header>

  <div class="flex-1 px-4 py-6">
    <form [formGroup]="editCourseForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
      <div>
        <label class="block text-xs font-light text-secondary-font mb-2" for="editCourseName">Course name</label>
        <input
          id="editCourseName"
          formControlName="courseName"
          class="w-full bg-background border border-borders rounded-xl px-4 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
          type="text"
        />
      </div>

      <div class="flex flex-col gap-3 pt-2">
        <button
          type="submit"
          class="w-full h-14 rounded-lg font-medium text-lg bg-primary text-onyx border-none outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
        >
          Save course
        </button>

        <button
          type="button"
          (click)="onDelete()"
          class="w-full h-14 rounded-lg font-medium text-lg bg-carbon-black text-error-light border border-error-light outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
        >
          Delete course
        </button>
      </div>
    </form>
  </div>
</div>
