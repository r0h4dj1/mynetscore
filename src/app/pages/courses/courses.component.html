<div class="flex flex-col h-full">
  <header class="flex items-center justify-between px-4 py-3 pt-10 border-b border-borders shrink-0">
    <h1 class="text-2xl font-medium m-0">Courses</h1>
    <button
      id="open-course-modal"
      type="button"
      class="flex items-center justify-center gap-1 px-4 py-2 rounded-lg bg-primary text-true-obsidian text-lg font-medium border-none outline-none h-11 active:scale-[0.98] transition-transform"
    >
      <ion-icon name="add"></ion-icon>
      Add
    </button>
  </header>

  <main class="flex-1 overflow-y-auto">
    <div class="px-4 py-6 h-full">
      @if (courses.length === 0) {
        <div class="flex flex-col items-center justify-center h-64 text-center px-6">
          <h2 class="text-secondary-font">No courses saved</h2>
        </div>
      }

      @if (courses.length > 0) {
        <div class="space-y-3 pb-8">
          @for (course of courses; track course.id) {
            <a
              class="bg-surface rounded-2xl p-4 flex items-center justify-between active:scale-[0.98] transition-transform no-underline"
              [routerLink]="['/courses', course.id]"
            >
              <div class="flex-1 min-w-0">
                <h3 class="text-lg m-0 text-primary-font">{{ course.name }}</h3>
                <p class="font-light text-secondary-font m-0 mt-0.5">
                  {{ course.teeCount }} {{ course.teeCount === 1 ? 'tee' : 'tees' }}
                </p>
              </div>
              <ion-icon name="chevron-forward" color="base-icon"></ion-icon>
            </a>
          }
        </div>
      }
    </div>
  </main>

  <ion-modal
    trigger="open-course-modal"
    [initialBreakpoint]="1"
    [breakpoints]="[0, 1]"
    handleBehavior="cycle"
    [style.--height]="'auto'"
    (didDismiss)="onAddCourseModalDismiss()"
  >
    <ng-template>
      <div class="flex flex-col bg-surface pb-6">
        <header class="px-4 pt-6 pb-4 border-b border-borders shrink-0">
          <h2 class="text-2xl font-medium m-0 text-primary-font">Add course</h2>
        </header>

        <div class="flex-1 px-4 py-6">
          <form [formGroup]="courseForm" (ngSubmit)="onAddCourseSubmit()" class="flex flex-col gap-6">
            <div>
              <label class="block text-xs font-light text-secondary-font mb-2" for="courseName">Course name</label>
              <input
                id="courseName"
                formControlName="courseName"
                class="w-full bg-background border border-borders rounded-xl px-4 py-3 text-base text-primary-font focus:outline-none focus:border-primary box-border"
                [appValidationStatus]="addCourseSubmitCount"
                type="text"
              />
            </div>

            <div class="flex items-center gap-4 py-1">
              <div class="h-px bg-borders flex-1"></div>
              <span class="text-lg text-primary-font">Add tee</span>
              <div class="h-px bg-borders flex-1"></div>
            </div>

            <div>
              <label class="block text-xs font-light text-secondary-font mb-2" for="teeName">Tee name</label>
              <input
                id="teeName"
                formControlName="teeName"
                class="w-full bg-background border border-borders rounded-xl px-4 py-3 text-base text-primary-font focus:outline-none focus:border-primary box-border"
                [appValidationStatus]="addCourseSubmitCount"
                type="text"
              />
            </div>

            <div class="flex gap-3">
              <div class="flex-1 min-w-0">
                <label class="block text-xs font-light text-secondary-font mb-2" for="rating">Course rating</label>
                <input
                  id="rating"
                  formControlName="rating"
                  class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary box-border"
                  [appValidationStatus]="addCourseSubmitCount"
                  type="number"
                  inputmode="decimal"
                  step="0.1"
                />
              </div>

              <div class="flex-1 min-w-0">
                <label class="block text-xs font-light text-secondary-font mb-2" for="slope">Slope rating</label>
                <input
                  id="slope"
                  formControlName="slope"
                  class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary box-border"
                  [appValidationStatus]="addCourseSubmitCount"
                  type="number"
                  inputmode="numeric"
                />
              </div>

              <div class="flex-1 min-w-0">
                <label class="block text-xs font-light text-secondary-font mb-2" for="par">Par</label>
                <input
                  id="par"
                  formControlName="par"
                  class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary box-border"
                  [appValidationStatus]="addCourseSubmitCount"
                  type="number"
                  inputmode="numeric"
                />
              </div>
            </div>

            <button
              type="submit"
              class="flex items-center justify-center gap-1 px-4 py-2 rounded-lg bg-primary text-true-obsidian text-lg font-medium border-none outline-none h-14 active:scale-[0.98] transition-transform"
            >
              Save course and tee
            </button>
          </form>
        </div>
      </div>
    </ng-template>
  </ion-modal>
</div>
