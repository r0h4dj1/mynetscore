<div class="flex flex-col h-full">
  <app-page-header title="Courses">
    <button
      action
      type="button"
      (click)="openAddCourseModal()"
      class="flex items-center justify-center gap-1 px-4 py-2 rounded-lg bg-primary text-onyx text-lg font-medium border-none outline-none h-11 active:scale-[0.98] transition-transform"
    >
      <ng-icon name="ionAdd"></ng-icon>
      Add
    </button>
  </app-page-header>

  <main class="flex-1 overflow-y-auto">
    <div class="px-4 py-6 h-full">
      @if (courses.length === 0) {
        <div class="flex flex-col items-center justify-center h-64 text-center px-6">
          <h2 class="text-secondary-font">No courses saved</h2>
        </div>
      }

      @if (courses.length > 0) {
        <div class="space-y-3 pb-8">
          @for (course of courses; track course.id) {
            <a
              class="bg-surface rounded-2xl p-4 flex items-center justify-between active:scale-[0.98] transition-transform no-underline"
              [routerLink]="['/courses', course.id]"
            >
              <div class="flex-1 min-w-0">
                <h3 class="text-lg m-0 text-primary-font">{{ course.name }}</h3>
                <p class="font-light text-secondary-font m-0 mt-0.5">
                  {{ course.teeCount }} {{ course.teeCount === 1 ? 'tee' : 'tees' }}
                </p>
              </div>
              <ng-icon name="ionChevronForward" [color]="'var(--color-alabaster-grey)'"></ng-icon>
            </a>
          }
        </div>
      }
    </div>
  </main>
</div>
