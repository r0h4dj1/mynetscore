<div class="flex flex-col h-full">
  <app-page-header title="Settings" backButton></app-page-header>

  <main class="flex-1 overflow-y-auto px-4 pt-4 pb-6">
    <section>
      <h2 id="region-group-label" class="text-lg font-medium text-primary-font m-0 mb-3 px-1">
        Handicap calculation region
      </h2>

      <div
        aria-labelledby="region-group-label"
        class="bg-surface rounded-2xl border border-borders divide-y divide-borders overflow-hidden"
      >
        @for (option of options; track option.value) {
          @let isSelected = region() === option.value;
          <label
            class="w-full flex items-center justify-between px-4 pt-4 pb-4 first:pb-3 last:pt-3 bg-transparent border-none outline-none text-left active:bg-graphite/40 transition-colors cursor-pointer"
          >
            <span class="text-primary-font">{{ option.label }}</span>
            <input
              type="radio"
              name="region"
              class="sr-only"
              [checked]="isSelected"
              (change)="onRegionChange(option.value)"
            />
            <span
              class="w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0"
              [class.border-primary]="isSelected"
              [class.border-alabaster-grey]="!isSelected"
              aria-hidden="true"
            >
              @if (isSelected) {
                <span class="w-2.5 h-2.5 rounded-full bg-primary"></span>
              }
            </span>
          </label>
        }
      </div>
    </section>
  </main>
</div>
