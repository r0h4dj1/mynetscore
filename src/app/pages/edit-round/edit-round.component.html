<div class="relative flex flex-col h-full">
  <app-page-header title="Edit round" backButton></app-page-header>

  <main class="flex-1 overflow-y-auto">
    <div class="px-4 py-6 h-full">
      <form [formGroup]="roundForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-8">
        <div class="flex flex-col gap-5">
          <section>
            <label class="block text-xs font-light text-secondary-font mb-2" for="courseId">Course</label>

            <div class="relative">
              <button
                type="button"
                id="courseId"
                class="w-full appearance-none bg-surface border text-left rounded-xl px-4 py-3 pr-12 text-base focus:outline-none box-border transition-colors active:bg-background"
                [class.text-primary-font]="roundForm.controls.courseId.value"
                [class.text-secondary-font]="!roundForm.controls.courseId.value"
                [class.border-error]="shouldShowError('courseId')"
                [class.border-borders]="!shouldShowError('courseId')"
                (click)="onCourseSelectorTap()"
              >
                <span class="block w-full truncate">
                  {{ selectedCourseLabel || 'Select a course...' }}
                </span>
              </button>
              <ng-icon
                name="ionChevronDown"
                class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-lg"
                [color]="'var(--color-alabaster-grey)'"
              ></ng-icon>
            </div>
          </section>

          <section>
            <label class="block text-xs font-light text-secondary-font mb-2" for="teeId">Tee</label>

            <div class="relative">
              <button
                type="button"
                id="teeId"
                class="w-full appearance-none border text-left rounded-xl px-4 py-3 pr-12 text-base focus:outline-none box-border transition-colors"
                [class.bg-surface]="!roundForm.controls.teeId.disabled"
                [class.bg-background]="roundForm.controls.teeId.disabled"
                [class.text-primary-font]="roundForm.controls.teeId.value"
                [class.text-secondary-font]="!roundForm.controls.teeId.value"
                [class.opacity-50]="roundForm.controls.teeId.disabled"
                [class.cursor-not-allowed]="roundForm.controls.teeId.disabled"
                [class.active:bg-background]="!roundForm.controls.teeId.disabled"
                [class.border-error]="shouldShowError('teeId')"
                [class.border-borders]="!shouldShowError('teeId')"
                [disabled]="roundForm.controls.teeId.disabled"
                (click)="onTeeSelectorTap()"
              >
                <span class="block w-full truncate">
                  @if (selectedTeeName) {
                    {{ selectedTeeName }}
                    <span class="ml-1.5 text-secondary-font font-light">{{ selectedTeeDetails }}</span>
                  } @else {
                    Select a tee...
                  }
                </span>
              </button>
              <ng-icon
                name="ionChevronDown"
                class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-lg"
                [color]="roundForm.controls.teeId.disabled ? 'var(--color-borders)' : 'var(--color-alabaster-grey)'"
              ></ng-icon>
            </div>
          </section>

          <div class="h-px bg-borders"></div>

          <section>
            <label class="block text-xs font-light text-secondary-font mb-2" for="date">Date played</label>
            <button
              type="button"
              class="relative w-full bg-surface border rounded-xl px-4 py-3 pr-12 text-left text-base text-primary-font focus:outline-none box-border"
              [class.border-error]="shouldShowError('date')"
              [class.border-borders]="!shouldShowError('date')"
              (click)="onDateSelectorTap()"
            >
              <span id="date" class="block w-full">
                {{ formattedDateLabel }}
              </span>
              <ng-icon
                name="ionCalendarClear"
                class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-lg"
                [color]="'var(--color-alabaster-grey)'"
              ></ng-icon>
            </button>
          </section>

          <section>
            <label class="block text-xs font-light text-secondary-font mb-2" for="grossScore">Gross score</label>
            <input
              id="grossScore"
              formControlName="grossScore"
              type="number"
              inputmode="numeric"
              [min]="minGrossScore"
              [max]="maxGrossScore"
              class="w-full bg-surface border border-borders rounded-xl px-4 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
              [appValidationStatus]="submitCount"
            />
          </section>
        </div>

        <div class="pb-6">
          <button
            type="submit"
            class="w-full h-14 rounded-lg font-medium text-lg border-none outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
            [class.bg-primary]="roundForm.valid && !isSaving && !isDeleting"
            [class.text-onyx]="roundForm.valid && !isSaving && !isDeleting"
            [class.bg-borders]="!roundForm.valid || isSaving || isDeleting"
            [class.text-secondary-font]="!roundForm.valid || isSaving || isDeleting"
            [disabled]="isSaving || isDeleting"
          >
            {{ isSaving ? 'Saving...' : 'Save round' }}
          </button>

          <button
            type="button"
            (click)="askDelete()"
            [disabled]="isSaving || isDeleting"
            class="mt-3 w-full h-14 rounded-lg font-medium text-lg bg-surface text-error-light border border-error-light outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
          >
            {{ isDeleting ? 'Deleting...' : 'Delete round' }}
          </button>

          @if (saveHelperText) {
            <p class="mt-3 mb-0 text-center text-xs font-light text-secondary-font">{{ saveHelperText }}</p>
          }
        </div>
      </form>
    </div>
  </main>

  @if (showDeleteConfirmation) {
    <app-pop-up
      title="Delete round?"
      primaryButtonText="Delete"
      secondaryButtonText="Cancel"
      (primaryAction)="confirmDelete()"
      (secondaryAction)="cancelDelete()"
    >
      <p class="m-0 text-sm leading-6 font-light text-secondary-font">Are you sure you want to delete this round?</p>
    </app-pop-up>
  }
</div>
