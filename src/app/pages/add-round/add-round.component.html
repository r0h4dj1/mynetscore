<div class="relative flex flex-col h-full">
  <header class="flex items-center justify-between px-4 py-3 pt-10 border-b border-borders shrink-0">
    <div class="flex items-center min-w-0">
      <a
        routerLink="/rounds"
        aria-label="Back to rounds"
        class="mr-2 flex items-center justify-center p-2 -ml-2 rounded-full active:bg-surface transition-colors"
      >
        <ng-icon name="ionChevronBack" class="text-2xl" [color]="'var(--color-warm-white-dim)'"></ng-icon>
      </a>
      <h1 class="text-xl font-medium text-primary-font truncate m-0">Add round</h1>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto">
    <div class="px-4 py-6 h-full">
      <form [formGroup]="roundForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-8">
        <div class="flex flex-col gap-5">
          <section>
            <div class="flex items-center justify-between mb-2">
              <label class="block text-xs font-light text-secondary-font" for="courseId">Course</label>
              <button
                type="button"
                class="bg-transparent border-none p-0 text-xs font-light text-primary-light active:opacity-80"
                (click)="openAddCourseModal()"
              >
                + Add new course
              </button>
            </div>

            <div class="relative">
              <button
                type="button"
                id="courseId"
                class="w-full appearance-none bg-surface border text-left rounded-xl px-4 py-3 pr-12 text-base focus:outline-none focus:border-primary-light box-border transition-colors active:bg-background"
                [class.text-primary-font]="roundForm.controls.courseId.value"
                [class.text-secondary-font]="!roundForm.controls.courseId.value"
                [class.border-danger]="shouldShowError('courseId')"
                [class.border-borders]="!shouldShowError('courseId')"
                (click)="openCourseSelector()"
              >
                <span class="block w-full truncate">
                  {{ selectedCourseLabel || 'Select a course...' }}
                </span>
              </button>
              <ng-icon
                name="ionChevronDown"
                class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-lg"
                [color]="'var(--color-warm-white-dim)'"
              ></ng-icon>
            </div>
          </section>

          <section>
            <div class="flex items-center justify-between mb-2">
              <label class="block text-xs font-light text-secondary-font" for="teeId">Tee</label>
              <button
                type="button"
                class="bg-transparent border-none p-0 text-xs font-light active:opacity-80"
                [class.text-primary-light]="!isAddTeeDisabled"
                [class.text-borders]="isAddTeeDisabled"
                [disabled]="isAddTeeDisabled"
                (click)="openAddTeeModal()"
              >
                + Add new tee
              </button>
            </div>

            <div class="relative">
              <button
                type="button"
                id="teeId"
                class="w-full appearance-none border text-left rounded-xl px-4 py-3 pr-12 text-base focus:outline-none focus:border-primary-light box-border transition-colors"
                [class.bg-surface]="!roundForm.controls.teeId.disabled"
                [class.bg-background]="roundForm.controls.teeId.disabled"
                [class.text-primary-font]="roundForm.controls.teeId.value"
                [class.text-secondary-font]="!roundForm.controls.teeId.value"
                [class.opacity-50]="roundForm.controls.teeId.disabled"
                [class.cursor-not-allowed]="roundForm.controls.teeId.disabled"
                [class.active:bg-background]="!roundForm.controls.teeId.disabled"
                [class.border-danger]="shouldShowError('teeId')"
                [class.border-borders]="!shouldShowError('teeId')"
                [disabled]="roundForm.controls.teeId.disabled"
                (click)="openTeeSelector()"
              >
                <span class="block w-full truncate">
                  {{ selectedTeeLabel || 'Select a tee...' }}
                </span>
              </button>
              <ng-icon
                name="ionChevronDown"
                class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-lg"
                [color]="'var(--color-warm-white-dim)'"
              ></ng-icon>
            </div>
          </section>

          <div class="h-px bg-borders"></div>

          <section>
            <label class="block text-xs font-light text-secondary-font mb-2" for="date">Date played</label>
            <button
              type="button"
              class="relative w-full bg-surface border rounded-xl px-4 py-3 pr-12 text-left text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
              [class.border-danger]="shouldShowError('date')"
              [class.border-borders]="!shouldShowError('date')"
              (click)="openDatePicker()"
            >
              <span id="date" class="block w-full">
                {{ formattedDateLabel }}
              </span>
              <ng-icon
                name="ionCalendarClear"
                class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-lg"
                [color]="'var(--color-warm-white-dim)'"
              ></ng-icon>
            </button>
          </section>

          <section>
            <label class="block text-xs font-light text-secondary-font mb-2" for="grossScore">Gross score</label>
            <input
              id="grossScore"
              formControlName="grossScore"
              type="number"
              inputmode="numeric"
              [min]="minGrossScore"
              [max]="maxGrossScore"
              class="w-full bg-surface border border-borders rounded-xl px-4 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
              [appValidationStatus]="submitCount"
            />
          </section>
        </div>

        <div class="pb-6">
          <button
            type="submit"
            class="w-full h-14 rounded-lg font-medium text-lg border-none outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
            [class.bg-primary]="roundForm.valid && !isSaving"
            [class.text-true-obsidian]="roundForm.valid && !isSaving"
            [class.bg-borders]="!roundForm.valid || isSaving"
            [class.text-secondary-font]="!roundForm.valid || isSaving"
            [disabled]="isSaving"
          >
            {{ isSaving ? 'Saving...' : 'Save round' }}
          </button>

          @if (saveHelperText) {
            <p class="mt-3 mb-0 text-center text-xs font-light text-secondary-font">{{ saveHelperText }}</p>
          }
        </div>
      </form>
    </div>
  </main>

  @if (showDuplicateConfirmation) {
    <div class="absolute inset-0 z-20 flex items-end justify-center bg-black/60 px-4 pb-6">
      <div class="w-full max-w-md overflow-hidden rounded-[28px] border border-borders bg-surface">
        <div class="px-4 pt-6 pb-4 border-b border-borders">
          <h2 class="m-0 text-2xl font-medium text-primary-font">Duplicate round?</h2>
        </div>

        <div class="px-4 py-6">
          <p class="m-0 text-sm leading-6 font-light text-secondary-font">{{ duplicateSummary }}</p>
          <p class="mt-4 mb-0 text-sm font-light text-secondary-font">Log another round anyway?</p>
        </div>

        <div class="px-4 pb-4 flex flex-col gap-3">
          <button
            type="button"
            class="w-full h-14 rounded-lg font-medium text-lg bg-primary text-true-obsidian border-none outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
            (click)="confirmDuplicateSave()"
          >
            Log anyway
          </button>
          <button
            type="button"
            class="w-full h-14 rounded-lg font-medium text-lg bg-surface text-primary-font border border-borders outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
            (click)="cancelDuplicateConfirmation()"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>
  }
</div>
