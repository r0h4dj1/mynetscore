<div class="flex flex-col h-full bg-true-obsidian px-4">
  <header class="flex items-center justify-between py-3 pt-10 shrink-0">
    <h1 class="text-2xl font-medium m-0 text-primary-font">Rounds</h1>
    <button
      [routerLink]="['/rounds/add']"
      type="button"
      class="flex items-center justify-center gap-1 px-4 py-2 rounded-lg bg-primary text-true-obsidian text-lg font-medium border-none outline-none h-11 active:scale-[0.98] transition-transform"
    >
      <ion-icon name="add"></ion-icon>
      Add
    </button>
  </header>

  <main class="flex-1 flex flex-col items-center justify-center text-center px-6">
    <h2 class="text-secondary-font font-light">No rounds recorded</h2>
  </main>
</div>
