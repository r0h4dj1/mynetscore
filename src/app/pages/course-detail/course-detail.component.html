<div class="flex flex-col h-full">
  <header class="flex items-center justify-between px-4 py-3 pt-10 border-b border-borders shrink-0">
    <div class="flex items-center min-w-0">
      <button
        type="button"
        (click)="goBack()"
        aria-label="Back"
        class="bg-transparent border-none outline-none mr-2 flex items-center justify-center p-2 -ml-2 rounded-full active:bg-surface transition-colors"
      >
        <ng-icon name="ionChevronBack" class="text-2xl" [color]="'var(--color-warm-white-dim)'"></ng-icon>
      </button>
      <h1 class="text-xl font-medium text-primary-font truncate m-0">{{ course?.name || 'Course Details' }}</h1>
    </div>
    <button
      type="button"
      (click)="openEditCourseModal()"
      title="Edit course"
      aria-label="Edit course"
      class="bg-transparent border-none outline-none p-2 -mr-2 active:bg-surface transition-colors flex items-center justify-center"
    >
      <ng-icon name="ionCreate" class="text-2xl" [color]="'var(--color-warm-white-dim)'"></ng-icon>
    </button>
  </header>

  <main class="flex-1 overflow-y-auto">
    @if (course) {
      <div class="px-4 py-6 h-full flex flex-col gap-8">
        <div>
          <h2 class="font-light text-secondary-font mb-3 mt-0">Tees</h2>

          @if (tees.length === 0) {
            <div class="flex flex-col items-center justify-center py-10 text-center px-6">
              <h2 class="text-secondary-font m-0">No tees saved</h2>
            </div>
          }

          <div class="space-y-3">
            @for (tee of tees; track tee.id) {
              <button
                type="button"
                (click)="openEditTeeModal(tee)"
                class="w-full text-left bg-surface rounded-2xl p-4 active:scale-[0.98] transition-transform border-none outline-none"
              >
                <div>
                  <h3 class="text-lg font-medium text-primary-font mb-1 mt-0">{{ tee.name }}</h3>
                  <div class="text-secondary-font font-light">
                    CR <span class="text-primary">{{ tee.rating }}</span> · SR
                    <span class="text-primary">{{ tee.slope }}</span> · Par
                    <span class="text-primary">{{ tee.par }}</span>
                  </div>
                </div>
              </button>
            }
          </div>
        </div>

        <div class="bg-surface rounded-2xl p-5">
          <h2 class="text-lg font-medium text-primary-font mb-6 mt-0">Add tee</h2>
          <form [formGroup]="teeForm" (ngSubmit)="onAddTeeSubmit()" class="flex flex-col gap-5">
            <div>
              <label class="block text-xs font-light text-secondary-font mb-2" for="teeName">Tee name</label>
              <input
                id="teeName"
                formControlName="teeName"
                class="w-full bg-background border border-borders rounded-xl px-4 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
                [appValidationStatus]="teeSubmitCount"
                type="text"
              />
            </div>

            <div class="flex gap-3">
              <div class="flex-1 min-w-0">
                <label class="block text-xs font-light text-secondary-font mb-2" for="rating">Course rating</label>
                <input
                  id="rating"
                  formControlName="rating"
                  class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
                  [appValidationStatus]="teeSubmitCount"
                  type="number"
                  inputmode="decimal"
                  step="0.1"
                />
              </div>

              <div class="flex-1 min-w-0">
                <label class="block text-xs font-light text-secondary-font mb-2" for="slope">Slope rating</label>
                <input
                  id="slope"
                  formControlName="slope"
                  class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
                  [appValidationStatus]="teeSubmitCount"
                  type="number"
                  inputmode="numeric"
                />
              </div>

              <div class="flex-1 min-w-0">
                <label class="block text-xs font-light text-secondary-font mb-2" for="par">Par</label>
                <input
                  id="par"
                  formControlName="par"
                  class="w-full bg-background border border-borders rounded-xl px-3 py-3 text-base text-primary-font focus:outline-none focus:border-primary-light box-border"
                  [appValidationStatus]="teeSubmitCount"
                  type="number"
                  inputmode="numeric"
                />
              </div>
            </div>

            <button
              type="submit"
              class="mt-2 w-full h-14 rounded-lg font-medium text-lg bg-primary text-true-obsidian border-none outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
            >
              Save tee
            </button>
          </form>
        </div>
      </div>
    }
  </main>
</div>
