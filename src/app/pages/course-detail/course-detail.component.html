<div class="flex flex-col h-full">
  <app-page-header [title]="course?.name || 'Course Details'" backButton>
    <button
      action
      type="button"
      (click)="openEditCourseModal()"
      title="Edit course"
      aria-label="Edit course"
      class="bg-transparent border-none outline-none p-2 -mr-2 active:bg-surface transition-colors flex items-center justify-center"
    >
      <ng-icon name="ionCreate" class="text-2xl" [color]="'var(--color-alabaster-grey)'"></ng-icon>
    </button>
  </app-page-header>

  <main class="flex-1 overflow-y-auto">
    @if (course) {
      <div class="px-4 py-6 h-full flex flex-col gap-8">
        <div>
          <h2 class="font-light text-secondary-font mb-3 mt-0">Tees</h2>

          @if (tees.length === 0) {
            <div class="flex flex-col items-center justify-center py-10 text-center px-6">
              <h2 class="text-secondary-font m-0">No tees saved</h2>
            </div>
          }

          <div class="space-y-3">
            @for (tee of tees; track tee.id) {
              <button
                type="button"
                (click)="openEditTeeModal(tee)"
                class="w-full text-left bg-surface rounded-2xl p-4 active:scale-[0.98] transition-transform border-none outline-none"
              >
                <div>
                  <h3 class="text-lg font-medium text-primary-font mb-1 mt-0">{{ tee.name }}</h3>
                  <div class="text-secondary-font font-light">
                    CR <span class="text-primary">{{ tee.rating }}</span> · SR
                    <span class="text-primary">{{ tee.slope }}</span> · Par
                    <span class="text-primary">{{ tee.par }}</span>
                  </div>
                </div>
              </button>
            }
          </div>
        </div>

        <div class="bg-surface rounded-2xl p-5">
          <h2 class="text-lg font-medium text-primary-font mb-6 mt-0">Add tee</h2>
          <form [formGroup]="teeForm" (ngSubmit)="onAddTeeSubmit()" autocomplete="off" class="flex flex-col gap-5">
            <app-tee-form [parentForm]="teeForm" [submitCount]="teeSubmitCount"></app-tee-form>

            <button
              type="submit"
              class="mt-2 w-full h-14 rounded-lg font-medium text-lg bg-primary text-onyx border-none outline-none active:scale-[0.98] transition-transform flex items-center justify-center"
            >
              Save tee
            </button>
          </form>
        </div>
      </div>
    }
  </main>
</div>
